name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # =========================
      # DOWNLOAD ZIP DENGAN RETRY & VALIDASI
      # =========================
      - name: Download ZIP from Release
        run: |
          echo "========================================="
          echo "📥 DOWNLOADING ZIP FROM RELEASE"
          echo "========================================="
          echo "URL: ${{ github.event.inputs.zip_url }}"
          echo ""
          
          # Download dengan retry mechanism
          for i in 1 2 3; do
            echo "Attempt $i..."
            
            HTTP_CODE=$(curl -L \
              -o project.zip \
              -w "%{http_code}" \
              "${{ github.event.inputs.zip_url }}")
            
            echo "HTTP Status: $HTTP_CODE"
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Download successful!"
              break
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "❌ File not found (404)!"
              echo ""
              echo "=== Possible causes: ==="
              echo "1. Release has been deleted or expired"
              echo "2. Wrong URL format"
              echo "3. Release is private"
              echo ""
              echo "=== Check your release: ==="
              echo "Go to: https://github.com/${{ github.repository }}/releases"
              echo "Find your release and copy the download URL"
              echo ""
              echo "=== Correct URL format: ==="
              echo "https://github.com/OWNER/REPO/releases/download/TAG/FILENAME.zip"
              echo "OR"
              echo "https://github.com/OWNER/REPO/archive/refs/tags/TAG.zip"
              exit 1
            else
              echo "⚠️ Unexpected status: $HTTP_CODE"
              if [ $i -eq 3 ]; then
                echo "❌ Failed after 3 attempts!"
                echo ""
                echo "=== Response Content ==="
                cat project.zip 2>/dev/null || echo "No content"
                exit 1
              fi
              sleep 2
            fi
          done
          
          echo ""
          echo "========================================="
          echo "📁 FILE INFO"
          echo "========================================="
          ls -lh project.zip
          
          echo ""
          echo "========================================="
          echo "🔍 VALIDATE ZIP"
          echo "========================================="
          if file project.zip | grep -q "Zip archive"; then
            echo "✅ ZIP file is valid!"
          else
            echo "❌ Not a valid ZIP file!"
            echo "File type: $(file project.zip)"
            exit 1
          fi

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "========================================="
          echo "📂 EXTRACTING ZIP"
          echo "========================================="
          unzip -q project.zip -d project_raw
          
          # Auto detect project root
          PROJECT_DIR=$(find project_raw -name "pubspec.yaml" -type f | head -n 1 | xargs dirname)
          
          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR="project_raw"
            echo "⚠️ Using default: $PROJECT_DIR"
          fi
          
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "✅ Project found at: $PROJECT_DIR"
          
          echo ""
          echo "========================================="
          echo "📁 PROJECT STRUCTURE"
          echo "========================================="
          ls -la $PROJECT_DIR
          
          if [ -f "$PROJECT_DIR/pubspec.yaml" ]; then
            echo "✅ pubspec.yaml found!"
          else
            echo "❌ pubspec.yaml NOT found!"
            echo "This is not a Flutter project!"
            exit 1
          fi

      # =========================
      # SETUP JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # SETUP ANDROID SDK
      # =========================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Accept Android Licenses
        run: |
          echo "✅ Accepting Android licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | sdkmanager --licenses 2>/dev/null || true
          echo "✅ Android licenses accepted"

      # =========================
      # SETUP FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.9"
          channel: "stable"
          cache: true

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: |
          flutter doctor -v

      # =========================
      # ANALYZE (OPTIONAL)
      # =========================
      - name: Analyze Project
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🔍 Running flutter analyze..."
          flutter analyze || true
          exit 0

      # =========================
      # DEPENDENCIES
      # =========================
      - name: Get Dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "========================================="
          echo "📦 GETTING DEPENDENCIES"
          echo "========================================="
          flutter pub get

      # =========================
      # CLEAN BUILD
      # =========================
      - name: Clean Previous Build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "🧹 Cleaning..."
          flutter clean || true
          rm -rf build/ || true
          echo "✅ Clean complete!"

      # =========================
      # FIX GRADLE
      # =========================
      - name: Fix Gradle Configuration
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "========================================="
          echo "🔧 FIXING GRADLE"
          echo "========================================="
          
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
            echo "✅ gradle-wrapper.properties fixed!"
          fi
          
          if [ -f "android/build.gradle" ]; then
            sed -i 's/classpath '\''com.android.tools.build:gradle:.*'\''/classpath '\''com.android.tools.build:gradle:7.4.2'\''/' android/build.gradle
            echo "✅ build.gradle fixed!"
          fi
          
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 33/' android/app/build.gradle
            echo "✅ app/build.gradle fixed!"
          fi

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        timeout-minutes: 20
        run: |
          echo "========================================="
          echo "🚀 BUILDING APK"
          echo "========================================="
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          echo "Mode: $BUILD_TYPE"
          
          flutter build apk --$BUILD_TYPE --verbose 2>&1 | tee build.log
          
          APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_FILE" ]; then
            echo ""
            echo "========================================="
            echo "❌ ERROR: APK NOT FOUND!"
            echo "========================================="
            echo ""
            echo "=== Build Log (last 100 lines) ==="
            tail -100 build.log
            exit 1
          fi
          
          echo ""
          echo "========================================="
          echo "✅ APK BUILD SUCCESS!"
          echo "========================================="
          echo "APK: $APK_FILE"
          echo "Size: $(du -h $APK_FILE | cut -f1)"
          
          echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error
