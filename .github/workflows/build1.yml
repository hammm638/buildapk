name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true

      tag:
        description: "Tag build"
        required: true

      build_type:
        description: "debug / release"
        required: true
        default: "release"
        
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

          echo ""
          echo "=== File Type ==="
          file project.zip

          echo ""
          echo "=== First Bytes ==="
          xxd project.zip | head -2

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="

          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file ==="
            cat project.zip
            exit 1
          fi

          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Isi folder project_raw ==="
          find project_raw | head -50

          echo ""
          echo "=== Mengunci Project Dir (Manut Mode) ==="
          
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi

          echo "✅ Project root langsung dikunci di: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # ANDROID SDK (FIXED)
      # =========================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Accept Android Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      # =========================
      # FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.24.5"
          channel: "stable"
          cache: true

      # ==========================================================
      # 🔍 TAHAP ANALYZE — STEP 1: Jalankan & cetak hasil
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="

          if [ -f "pubspec.yaml" ]; then
            echo "🔍 Menjalankan linting via flutter analyze..."

            flutter analyze > analyze_report.txt 2>&1 || true

            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"

            rm -f analyze_report.txt

          else
            echo "☕ Project native / gradlew terdeteksi!"
            echo "[RESULT_ANALYZE]"
            echo "❌ Fitur analyze hanya support project Flutter (pubspec.yaml tidak ditemukan)."
            echo "[END_RESULT_ANALYZE]"
          fi

      # ==========================================================
      # 🔍 TAHAP ANALYZE — STEP 2: Stop workflow jika only_analyze
      # ==========================================================
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "Analyze-only mode aktif. Workflow dihentikan di sini."
          exit 1

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: flutter doctor

      # ==========================================================
      # 📦 TAHAP DOWNLOAD DEPENDENSI (FIXED: tanpa timeout)
      # ==========================================================
      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Running flutter pub get ==="
          if [ -f "pubspec.yaml" ]; then
            flutter pub get || echo "⚠️ Gagal pub get, coba lanjut..."
          else
            echo "☕ Bukan project Flutter standar, skip pub get!"
          fi

      # ==========================================================
      # 🚀 TAHAP PEMBAKARAN UTAMA (BUILD APK) - FIXED
      # ==========================================================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          echo "Mode: $BUILD_TYPE"

          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Project Flutter Terdeteksi! Kompilasi via Flutter SDK..."
            flutter build apk --$BUILD_TYPE
            
            # SET APK PATH YANG BENAR UNTUK FLUTTER
            APK_FILE="build/app/outputs/flutter-apk/app-$BUILD_TYPE.apk"
            
            if [ ! -f "$APK_FILE" ]; then
              echo "❌ APK tidak ditemukan di: $APK_FILE"
              echo "Mencari alternatif..."
              find . -name "*.apk"
              exit 1
            fi
            
          else
            echo "☕ Project Native Android Terdeteksi! Bypassing Flutter Core..."
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            
            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              exit 1
            fi
            
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            
            echo "🚀 Membakar APK menggunakan Gradle Native..."
            if [ "$BUILD_TYPE" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
            cd -
            
            # SET APK PATH YANG BENAR UNTUK NATIVE
            APK_FILE="app/build/outputs/apk/$BUILD_TYPE/app-$BUILD_TYPE.apk"
            
            if [ ! -f "$APK_FILE" ]; then
              echo "❌ APK tidak ditemukan di: $APK_FILE"
              echo "Mencari alternatif..."
              find . -name "*.apk"
              exit 1
            fi
          fi

          echo "✅ APK berhasil dibangun: $APK_FILE"
          echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
          
          echo ""
          echo "=== APK Size ==="
          ls -lh "$APK_FILE"

      # ==========================================================
      # 📤 UPLOAD APK (FIXED: path langsung)
      # ==========================================================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error