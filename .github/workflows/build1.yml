name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # =========================
      # DOWNLOAD ZIP DENGAN VALIDASI
      # =========================
      - name: Download ZIP Project
        run: |
          echo "========================================="
          echo "📥 DOWNLOADING ZIP FILE"
          echo "========================================="
          echo "URL: ${{ github.event.inputs.zip_url }}"
          echo ""
          
          # Download dengan header yang benar
          curl -L \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            -o project.zip \
            -w "HTTP Status: %{http_code}\n" \
            "${{ github.event.inputs.zip_url }}"
          
          echo ""
          echo "========================================="
          echo "📁 FILE INFO"
          echo "========================================="
          ls -lh project.zip
          
          echo ""
          echo "========================================="
          echo "🔍 CHECK FILE TYPE"
          echo "========================================="
          file project.zip
          
          echo ""
          echo "========================================="
          echo "🔍 CHECK FIRST 100 BYTES"
          echo "========================================="
          head -c 100 project.zip | xxd
          
          echo ""
          echo "========================================="
          echo "🔍 CHECK IF HTML"
          echo "========================================="
          if head -c 100 project.zip | grep -q "<html\|<!DOCTYPE"; then
            echo "❌ ERROR: File is HTML, not ZIP!"
            echo ""
            echo "=== HTML Content (first 500 chars) ==="
            head -c 500 project.zip
            echo ""
            echo ""
            echo "=== Possible causes: ==="
            echo "1. Invalid URL (not pointing to zip file)"
            echo "2. GH_TOKEN expired or invalid"
            echo "3. Repository is private and token doesn't have access"
            echo "4. GitHub API rate limit exceeded"
            exit 1
          fi
          
          echo ""
          echo "========================================="
          echo "🔍 VALIDATE ZIP"
          echo "========================================="
          if unzip -t project.zip 2>&1 | grep -q "End-of-central-directory"; then
            echo "❌ ERROR: Invalid ZIP file!"
            exit 1
          fi
          
          echo "✅ ZIP file is valid!"

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "========================================="
          echo "📂 EXTRACTING ZIP"
          echo "========================================="
          unzip -q project.zip -d project_raw
          
          echo ""
          echo "========================================="
          echo "🔍 FINDING PROJECT ROOT"
          echo "========================================="
          
          # Cari pubspec.yaml
          PUBSPEC_PATH=$(find project_raw -name "pubspec.yaml" -type f | head -n 1)
          
          if [ -n "$PUBSPEC_PATH" ]; then
            PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
            echo "✅ Found Flutter project at: $PROJECT_DIR"
          else
            # Cari gradlew
            GRADLEW_PATH=$(find project_raw -name "gradlew" -type f | head -n 1)
            if [ -n "$GRADLEW_PATH" ]; then
              PROJECT_DIR=$(dirname "$GRADLEW_PATH")
              echo "✅ Found Native project at: $PROJECT_DIR"
            else
              PROJECT_DIR="project_raw"
              echo "⚠️ Using default: $PROJECT_DIR"
            fi
          fi
          
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          
          echo ""
          echo "========================================="
          echo "📁 PROJECT STRUCTURE"
          echo "========================================="
          ls -la $PROJECT_DIR
          
          if [ -f "$PROJECT_DIR/pubspec.yaml" ]; then
            echo ""
            echo "📄 pubspec.yaml found!"
            cat $PROJECT_DIR/pubspec.yaml | head -20
          fi

      # =========================
      # SETUP JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # SETUP ANDROID SDK
      # =========================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Accept Android Licenses
        run: |
          echo "✅ Accepting Android licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | sdkmanager --licenses || true
          echo "✅ Android licenses accepted"

      # =========================
      # SETUP FLUTTER (VERSION LAMA)
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.9"
          channel: "stable"
          cache: true

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: |
          flutter doctor -v

      # =========================
      # ANALYZE (OPTIONAL)
      # =========================
      - name: Analyze Project Code
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "========================================="
          echo "🔍 RUNNING FLUTTER ANALYZE"
          echo "========================================="
          flutter analyze || true
          echo "✅ Analyze complete!"

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "========================================="
          echo "⏹️ Analyze-only mode. Stopping workflow."
          echo "========================================="
          exit 0

      # =========================
      # DEPENDENCIES
      # =========================
      - name: Get Dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "========================================="
          echo "📦 GETTING DEPENDENCIES"
          echo "========================================="
          
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
            echo "✅ Dependencies installed!"
          else
            echo "☕ Native project, skip pub get"
          fi

      # =========================
      # FIX GRADLE (UNTUK FLUTTER LAMA)
      # =========================
      - name: Fix Android Gradle
        working-directory: ${{ env.PROJECT_DIR }}
        if: hashFiles('android/build.gradle') != ''
        run: |
          echo "========================================="
          echo "🔧 FIXING GRADLE FOR OLD FLUTTER"
          echo "========================================="
          
          # Fix gradle-wrapper.properties
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "Fixing gradle-wrapper.properties..."
            sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
            cat android/gradle/wrapper/gradle-wrapper.properties
          fi
          
          # Fix build.gradle
          if [ -f "android/build.gradle" ]; then
            echo "Fixing build.gradle..."
            sed -i 's/classpath '\''com.android.tools.build:gradle:.*'\''/classpath '\''com.android.tools.build:gradle:7.4.2'\''/' android/build.gradle
          fi

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "========================================="
          echo "🚀 BUILDING APK"
          echo "========================================="
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          echo "Mode: $BUILD_TYPE"
          
          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Building Flutter APK..."
            flutter build apk --$BUILD_TYPE
            
            # Cari APK
            APK_FILE=$(find build -name "*.apk" -type f | head -n 1)
            
            if [ -z "$APK_FILE" ]; then
              echo "❌ No APK found!"
              echo ""
              echo "=== Build directory ==="
              find build -type f 2>/dev/null || echo "Build directory not found"
              exit 1
            fi
            
            echo "✅ APK found: $APK_FILE"
            echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
            
          else
            echo "☕ Building Native Android APK..."
            
            # Cari gradlew
            GRADLEW_PATH=$(find . -name "gradlew" -type f | head -n 1)
            
            if [ -z "$GRADLEW_PATH" ]; then
              echo "❌ gradlew not found!"
              exit 1
            fi
            
            GRADLE_DIR=$(dirname "$GRADLEW_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            
            # Build
            if [ "$BUILD_TYPE" = "debug" ]; then
              ./gradlew assembleDebug --no-daemon
            else
              ./gradlew assembleRelease --no-daemon
            fi
            
            cd -
            
            # Cari APK
            APK_FILE=$(find . -name "*.apk" -type f | grep -v "unaligned" | head -n 1)
            
            if [ -z "$APK_FILE" ]; then
              echo "❌ No APK found!"
              find . -name "*.apk"
              exit 1
            fi
            
            echo "✅ APK found: $APK_FILE"
            echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
          fi
          
          echo ""
          echo "========================================="
          echo "📊 APK SIZE"
          echo "========================================="
          ls -lh $APK_FILE

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error
