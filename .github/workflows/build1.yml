name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true

      tag:
        description: "Tag build"
        required: true

      build_type:
        description: "debug / release"
        required: true
        default: "release"
        
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo "=== Finding Project Root ==="
          # Cari pubspec.yaml
          PUBSPEC_PATH=$(find project_raw -name "pubspec.yaml" -type f | head -n 1)
          
          if [ -n "$PUBSPEC_PATH" ]; then
            PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
            echo "✅ Found Flutter project at: $PROJECT_DIR"
          else
            # Cari gradlew
            GRADLEW_PATH=$(find project_raw -name "gradlew" -type f | head -n 1)
            if [ -n "$GRADLEW_PATH" ]; then
              PROJECT_DIR=$(dirname "$GRADLEW_PATH")
              echo "✅ Found Native project at: $PROJECT_DIR"
            else
              PROJECT_DIR="project_raw"
              echo "⚠️ Using default: $PROJECT_DIR"
            fi
          fi
          
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          
          echo ""
          echo "=== Project Structure ==="
          ls -la $PROJECT_DIR

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      # =========================
      # ANDROID SDK
      # =========================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Accept Android Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | sdkmanager --licenses || true
          echo "✅ Android licenses accepted"

      # =========================
      # FLUTTER (VERSION LAMA)
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.9"  # ← VERSION LAMA YANG STABIL
          channel: "stable"
          cache: true

      # ==========================================================
      # 🔍 ANALYZE
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="

          if [ -f "pubspec.yaml" ]; then
            echo "🔍 Running flutter analyze..."
            flutter analyze || true
          else
            echo "☕ Native project detected, skip analyze"
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "Analyze-only mode. Stopping workflow."
          exit 0

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: flutter doctor -v

      # ==========================================================
      # 📦 DEPENDENCIES
      # ==========================================================
      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Getting dependencies ==="
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
          else
            echo "☕ Native project, skip pub get"
          fi

      # ==========================================================
      # 🔧 FIX GRADLE UNTUK VERSION LAMA
      # ==========================================================
      - name: Fix Android Gradle for old Flutter
        working-directory: ${{ env.PROJECT_DIR }}
        if: hashFiles('android/build.gradle') != ''
        run: |
          echo "=== Fixing Android Gradle ==="
          
          # Fix build.gradle untuk Flutter lama
          if [ -f "android/build.gradle" ]; then
            sed -i 's/classpath '\''com.android.tools.build:gradle:.*'\''/classpath '\''com.android.tools.build:gradle:7.4.2'\''/' android/build.gradle
          fi
          
          # Fix gradle-wrapper.properties
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          fi

      # ==========================================================
      # 🚀 BUILD APK
      # ==========================================================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          echo "Mode: $BUILD_TYPE"

          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Building Flutter APK..."
            flutter build apk --$BUILD_TYPE
            
            # Cari APK
            APK_FILE=$(find build -name "*.apk" -type f | head -n 1)
            
            if [ -z "$APK_FILE" ]; then
              echo "❌ No APK found!"
              find . -name "*.apk"
              exit 1
            fi
            
            echo "✅ APK found: $APK_FILE"
            echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
            
          else
            echo "☕ Building Native Android APK..."
            
            # Cari gradlew
            GRADLEW_PATH=$(find . -name "gradlew" -type f | head -n 1)
            
            if [ -z "$GRADLEW_PATH" ]; then
              echo "❌ gradlew not found!"
              exit 1
            fi
            
            GRADLE_DIR=$(dirname "$GRADLEW_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            
            # Build
            if [ "$BUILD_TYPE" = "debug" ]; then
              ./gradlew assembleDebug --no-daemon
            else
              ./gradlew assembleRelease --no-daemon
            fi
            
            cd -
            
            # Cari APK
            APK_FILE=$(find . -name "*.apk" -type f | grep -v "unaligned" | head -n 1)
            
            if [ -z "$APK_FILE" ]; then
              echo "❌ No APK found!"
              find . -name "*.apk"
              exit 1
            fi
            
            echo "✅ APK found: $APK_FILE"
            echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
          fi
          
          echo ""
          echo "=== APK Size ==="
          ls -lh $APK_FILE

      # ==========================================================
      # 📤 UPLOAD
      # ==========================================================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error
