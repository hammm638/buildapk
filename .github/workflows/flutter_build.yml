name: Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file project Flutter'
        required: true
        type: string
      tag:
        description: 'Build tag'
        required: true
        type: string
      build_type:
        description: 'Debug or Release'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'
      
      - name: Download ZIP
        run: |
          curl -L -o project.zip "${{ inputs.zip_url }}"
          unzip -q project.zip
          rm project.zip
          ls -la
      
      - name: Check pubspec.yaml
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi
          echo "✅ pubspec.yaml found"
          cat pubspec.yaml | head -5
      
      - name: Get Dependencies
        run: |
          flutter clean
          flutter pub get
      
      - name: Build APK
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.tag }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 3
