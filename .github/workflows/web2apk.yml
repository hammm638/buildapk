name: Web to APK Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'Application Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    name: Build WebView APK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download icon
        run: |
          curl -L -o icon.png "${{ inputs.icon_url }}"
          file icon.png

      - name: Install PWA Builder
        run: npm install -g @pwabuilder/cli

      - name: Build APK
        run: |
          SAFE_NAME=$(echo "${{ inputs.app_name }}" | sed 's/[^a-zA-Z0-9]//g' | tr '[:upper:]' '[:lower:]')
          PACKAGE_NAME="com.webapp.${SAFE_NAME:-webapp}"
          
          mkdir -p app
          cd app
          
          npx @pwabuilder/cli generate \
            --platform=android \
            --url="${{ inputs.web_url }}" \
            --name="${{ inputs.app_name }}" \
            --package="$PACKAGE_NAME" \
            --icon=../icon.png
          
          cd android
          ./gradlew assembleRelease
          
          cp app/build/outputs/apk/release/app-release.apk ../../app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ github.run_id }}
          path: app.apk
          retention-days: 3
